name: Android CI - Tres en Raya

# Se ejecuta cada vez que haces un push a la rama master o main
on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Permisos para Gradle
        run: chmod +x gradlew

      # --- ACCIONES SOLICITADAS ---

      - name: Mensaje antes de Construir
        run: echo "Iniciando la construcción del proyecto Tres en Raya..."

      - name: Build con Gradle
        run: ./gradlew assembleDebug

      - name: Mensaje después de Construir
        run: echo "Construcción finalizada con éxito."

      - name: Mensaje antes de los Tests
        run: echo "Ejecutando tests unitarios (GameViewModelTest)..."

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Mensaje final
        run: echo "Todos los tests han pasado correctamente. CI completada."